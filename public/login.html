<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Login</title>
</head>

<body class="min-h-screen flex flex-col bg-slate-100 font-sans">

    <div class="flex-1 flex items-center justify-center px-4">
        <div class="w-full max-w-md">
            <form id="loginForm" class="bg-white rounded-2xl shadow-md p-8 space-y-5">

                <h2 class="text-2xl font-bold text-slate-700 text-center">Login</h2>

                <!-- Username -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5"
                        for="username">Username</label>
                    <input id="username" name="username" type="text" placeholder="Enter your username" required class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm text-slate-700
                 placeholder-slate-400 outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent" />
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5"
                        for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Enter your password" required
                        class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm text-slate-700
                 placeholder-slate-400 outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent" />
                </div>

                <!-- Submit -->
                <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white font-semibold
               py-2.5 px-4 rounded-lg transition-colors duration-200">
                    Login
                </button>

                <!-- Sign Up -->
                <div class="text-center">
                    <p class="text-sm text-slate-500">Don't have an account?
                        <a href="/signup"
                            class="text-blue-500 hover:text-blue-700 font-semibold transition-colors duration-200">
                            Sign Up
                        </a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script>

        fetch('/components/nav.html')
            .then(response => response.text())
            .then(data => {
                const navContainer = document.createElement('div');
                navContainer.innerHTML = data;
                document.body.insertBefore(navContainer, document.body.firstChild);
            })
            .catch(error => console.error('Error loading navigation:', error));



        // form validation logic

        const scriptURL = "https://script.google.com/macros/s/AKfycbwlAYJ_sySDJ68BsxTbJXeG2xp5VCH0dgnVkkH3hU5uHC7Z56rq9JprtdHjUgI5gmm-/exec";

        const form = document.getElementById('loginForm');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            fetch(`${scriptURL}?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = '/display'; // Redirect to display page
                    return;

                    } else {
                        alert(data.message);
                    }
                })
        });

    </script>

</body>

</html>
